services:
  - type: web
    name: polymarket-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health

    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: PAPER_TRADING
        value: "true"
      - key: SKIP_STARTUP_TESTS
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── Set these as secret env vars in the Render dashboard ──────────────
      # POLYMARKET_API_KEY
      # POLYMARKET_API_SECRET
      # POLYMARKET_PASSPHRASE
      # WALLET_PRIVATE_KEY         (only needed for live trading)
      # NEWS_API_KEY               (optional — enables sentiment analysis)
      # WEBHOOK_URL                (optional — Slack/Discord alerts)
      # LIVE_TRADING_CONFIRMED     (set to "true" only when PAPER_TRADING=false)
